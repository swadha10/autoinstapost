# HTTP → HTTPS redirect
server {
    listen 80;
    server_name autoig.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name autoig.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/autoig.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autoig.duckdns.org/privkey.pem;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_proxied any;
    gzip_vary on;

    # Vite content-hashed assets — safe to cache forever (immutable)
    location /assets/ {
        alias /home/ubuntu/autoinstapost/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API and backend routes — proxy to uvicorn
    location ~ ^/(auth|drive|instagram|schedule|caption|photos|health|temp)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA — serve index.html for all other paths (React Router handles routing)
    location / {
        root /home/ubuntu/autoinstapost/frontend/dist;
        try_files $uri /index.html;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
