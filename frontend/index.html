<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoIG</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #111; -webkit-text-size-adjust: 100%; }
      /* Hide scrollbar on tab bar but keep scroll */
      .tab-bar::-webkit-scrollbar { display: none; }
      /* Bigger tap targets on mobile */
      @media (max-width: 640px) {
        button, select, input, textarea { font-size: 16px !important; } /* prevents iOS zoom */
        input[type="number"] { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
